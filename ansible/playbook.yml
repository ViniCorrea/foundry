---
- name: Deploy Foundry VTT on Azure VM
  hosts: foundry
  become: true
  vars_files:
    - group_vars/all/vault.yml

  vars:
    foundry_data_dir: /opt/foundrydata
    foundry_port: 30000
    foundry_domain: "{{ hostvars[inventory_hostname].foundry_domain | default('foundry.anemush.com') }}"
    docker_compose_version: "2.24.0"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [setup, apt]

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      tags: [setup, apt]

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - cifs-utils
        state: present
      tags: [docker]

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      tags: [docker]

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      tags: [docker]

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes
      tags: [docker]

    - name: Ensure Docker service is running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes
      tags: [docker]

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      tags: [docker]

    - name: Download Docker Compose
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      tags: [docker, compose]

    - name: Verify Docker Compose installation
      ansible.builtin.command: docker-compose --version
      register: compose_version
      changed_when: false
      tags: [docker, compose]

    - name: Display Docker Compose version
      ansible.builtin.debug:
        msg: "{{ compose_version.stdout }}"
      tags: [docker, compose]

    - name: Install Caddy prerequisites
      ansible.builtin.apt:
        name:
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
        state: present
      tags: [caddy]

    - name: Add Caddy GPG key
      ansible.builtin.apt_key:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        state: present
      tags: [caddy]

    - name: Add Caddy repository
      ansible.builtin.apt_repository:
        repo: "deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
        state: present
      tags: [caddy]

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: yes
      tags: [caddy]

    - name: Ensure Caddy service is enabled
      ansible.builtin.systemd:
        name: caddy
        enabled: yes
      tags: [caddy]

    - name: Create Foundry data directory
      ansible.builtin.file:
        path: "{{ foundry_data_dir }}"
        state: directory
        mode: '0755'
      tags: [storage]

    - name: Create credentials file for Azure File Share
      ansible.builtin.copy:
        dest: /etc/smbcredentials
        content: |
          username={{ azure_storage_account }}
          password={{ azure_storage_account_key }}
        mode: '0600'
        owner: root
        group: root
      no_log: true
      tags: [storage]

    - name: Mount Azure File Share via CIFS
      ansible.posix.mount:
        path: "{{ foundry_data_dir }}"
        src: "//{{ azure_storage_account }}.file.core.windows.net/{{ azure_fileshare_name }}"
        fstype: cifs
        opts: "credentials=/etc/smbcredentials,uid=1000,gid=1000,dir_mode=0755,file_mode=0644,serverino,nosharesock,actimeo=30"
        state: mounted
      tags: [storage]

    - name: Verify mount point
      ansible.builtin.command: mountpoint -q {{ foundry_data_dir }}
      register: mount_check
      changed_when: false
      failed_when: mount_check.rc != 0
      tags: [storage]

    - name: Create Foundry app directory
      ansible.builtin.file:
        path: /opt/foundry
        state: directory
        mode: '0755'
      tags: [foundry]

    - name: Create Caddy log directory
      ansible.builtin.file:
        path: /var/log/caddy
        state: directory
        mode: '0755'
        owner: caddy
        group: caddy
      tags: [caddy]

    - name: Deploy Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        mode: '0644'
        owner: root
        group: root
        validate: 'caddy validate --adapter caddyfile --config %s'
      notify: Reload Caddy
      tags: [caddy]

    - name: Verify DNS resolution for domain
      ansible.builtin.command: dig +short {{ foundry_domain }} @8.8.8.8
      register: dns_check
      changed_when: false
      failed_when: dns_check.stdout == ""
      tags: [caddy, verify]

    - name: Display DNS resolution result
      ansible.builtin.debug:
        msg: "Domain {{ foundry_domain }} resolves to {{ dns_check.stdout }}"
      tags: [caddy, verify]

    - name: Start Caddy service
      ansible.builtin.systemd:
        name: caddy
        state: started
      tags: [caddy]

    - name: Deploy docker-compose.yml
      ansible.builtin.template:
        src: templates/docker-compose.yml.j2
        dest: /opt/foundry/docker-compose.yml
        mode: '0644'
      notify: Restart Foundry VTT
      tags: [foundry]

    - name: Pull Foundry VTT Docker image
      ansible.builtin.shell:
        cmd: docker compose pull
        chdir: /opt/foundry
      tags: [foundry, docker]

    - name: Start Foundry VTT with Docker Compose
      ansible.builtin.shell:
        cmd: docker compose up -d
        chdir: /opt/foundry
      tags: [foundry, docker]

    - name: Wait for Foundry VTT to be healthy
      ansible.builtin.wait_for:
        port: "{{ foundry_port }}"
        delay: 10
        timeout: 120
      tags: [foundry]

  handlers:
    - name: Restart Foundry VTT
      ansible.builtin.shell:
        cmd: docker compose restart
        chdir: /opt/foundry
      tags: [foundry]

    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
      tags: [caddy]
